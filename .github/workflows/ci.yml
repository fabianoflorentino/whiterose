name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (skip publishing)'
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
env:
  GO_VERSION: '1.26'
  SKIP_DOTENV: 'true'
  CI: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -short -race ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        run: |
          go test -short -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check internal package coverage ≥ 80%
        run: |
          for pkg in internal/interfaces internal/services internal/application internal/domain/entities internal/domain/entities/docker; do
            if [ -d "$pkg" ]; then
              COVERAGE=$(go tool cover -func=coverage.out \
                | grep "^$pkg/" \
                | tail -1 \
                | awk '{print $3}' \
                | tr -d '%')
              NAME=$(echo "$pkg" | tr '/' '-')
              echo "Coverage $pkg: ${COVERAGE}%"
              if [ ! -z "$COVERAGE" ] && awk "BEGIN {exit !($COVERAGE < 80)}"; then
                echo "::warning::Coverage ${COVERAGE}% for $pkg is below 80%"
              fi
            fi
          done
          echo "✅ Coverage check completed"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: go build -o whiterose main.go

      - name: Verify binary
        run: |
          ./whiterose --help | head -10

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --target production -t whiterose-test .
