name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.26'
  SKIP_DOTENV: 'true'
  CI: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -short -race ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        run: |
          go test -short -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage ≥ 80%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the required 80%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 80% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: go build -o whiterose main.go

      - name: Verify binary
        run: |
          ./whiterose --help | head -10

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --target production -t whiterose-test .

  # Optional: integration tests with secrets
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Only runs if secrets are configured
    # Skip if not all required secrets are available
    continue-on-error: true
    env:
      GIT_USER: ${{ secrets.GIT_USER || '' }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN || '' }}
      SSH_KEY_PATH: ${{ secrets.SSH_KEY_PATH || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create test config
        if: env.GIT_USER != ''
        run: |
          cat > test-config.json << 'EOF'
          {
            "repositories": [],
            "applications": []
          }
          EOF

      - name: Run with config
        if: env.GIT_USER != ''
        run: |
          echo "Git user configured: $GIT_USER"
          ./whiterose pre-req --list || true