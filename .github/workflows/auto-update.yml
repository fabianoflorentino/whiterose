name: Automated Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1'  # Toda segunda-feira às 02:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de operação'
        required: true
        default: 'report'
        type: choice
        options:
          - report
          - update
          - both
      skip_tests:
        description: 'Pular testes'
        required: false
        default: 'false'
        type: boolean
      target:
        description: 'Alvo específico'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  GO_VERSION: '1.26'

jobs:
  report:
    runs-on: ubuntu-latest
    if: inputs.mode == 'report' || inputs.mode == 'both' || github.event.inputs.mode == ''
    outputs:
      report_generated: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate Updates Report
        id: report
        run: |
          go run . update --list --config update-config.yaml

      - name: Create Report PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: weekly dependency updates report'
          title: '📦 Weekly Dependency Updates Report'
          body: |
            ## Automated Dependency Updates Report

            This PR contains the weekly dependency updates report generated by whiterose.

            ### Available Updates
            - Go packages with available updates
            - Latest Go version
            - Docker base image updates

            ---
            *Generated by GitHub Actions workflow.*
          branch: chore/weekly-dependency-report
          delete-branch: true
          labels: |
            dependencies
            automated
            report

  update:
    needs: report
    if: inputs.mode == 'update' || inputs.mode == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Update packages
        if: inputs.target == '' || inputs.target == 'packages'
        run: go run . update --packages --config update-config.yaml --dry-run

      - name: Update Go version
        if: inputs.target == '' || inputs.target == 'go-version'
        run: go run . update --go-version --config update-config.yaml

      - name: Update Docker images
        if: inputs.target == '' || inputs.target == 'docker-image'
        run: go run . update --docker-image --config update-config.yaml

  tests:
    needs: update
    if: inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race ./...

  create-pr:
    needs: [update, tests]
    if: inputs.mode == 'update' || inputs.mode == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(ci): automated dependency updates'
          title: '⬆️ Automated dependency updates'
          body: |
            ## Automated Dependency Updates

            This PR was automatically created by the GitHub Actions workflow.

            ### Changes
            - Updated Go packages to latest versions
            - Updated Go version if available
            - Updated Docker base images

            ---
            *This is an automated PR generated by the whiterose update command.*

          branch: chore/automated-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            ci

  notify:
    needs: [report, create-pr]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success notification
        if: needs.report.result == 'success'
        run: |
          echo "✅ Dependency updates workflow completed successfully"
          echo "Report PR: ${{ needs.report.outputs.pr_url }}"

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Dependency update workflow failed"
          echo "Check the workflow logs for details"