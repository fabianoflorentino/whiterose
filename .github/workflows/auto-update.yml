name: Automated Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1'  # Toda segunda-feira às 02:00 UTC
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes'
        required: false
        default: 'false'
        type: boolean
      target:
        description: 'Alvo específico'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  GO_VERSION: '1.26'

jobs:
  dependencies-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: List available updates
        run: go run . update --list --config update-config.yaml

      - name: Update Go packages
        if: inputs.target == '' || inputs.target == 'packages'
        run: go run . update --packages --config update-config.yaml --dry-run

      - name: Update Go version
        if: inputs.target == '' || inputs.target == 'go-version'
        run: go run . update --go-version --config update-config.yaml

      - name: Update Docker images
        if: inputs.target == '' || inputs.target == 'docker-image'
        run: go run . update --docker-image --config update-config.yaml

  tests:
    needs: dependencies-update
    if: inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race ./...

  create-pr:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(ci): automated dependency updates'
          title: '⬆️ Automated dependency updates'
          body: |
            ## Automated Dependency Updates

            This PR was automatically created by the GitHub Actions workflow.

            ### Changes
            - Updated Go packages to latest versions
            - Updated Go version if available
            - Updated Docker base images

            ---
            *This is an automated PR generated by the whiterose update command.*

          branch: chore/automated-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            ci

          reviewers: |
            ${{ github.actor }}

  notify:
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - name: Success notification
        if: success()
        run: |
          echo "✅ Dependency updates completed successfully"
          echo "PR created: ${{ needs.create-pr.outputs.pr-number }}"

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Dependency update workflow failed"
          echo "Check the workflow logs for details"