name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Toda segunda-feira às 00:00
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Tipo de atualização'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - packages
          - go-version
          - docker-image

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      updates_list: ${{ steps.check.outputs.updates_list }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Read update config
        id: check
        run: |
          if [ -f "${{ github.event.inputs.config_path || 'update-config.yaml' }}" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "updates_list={\"type\": \"${{ github.event.inputs.update_type || 'all' }}\"}" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: List available updates
        if: github.event.inputs.update_type != '' || github.event.inputs.update_type == 'all'
        run: |
          go run . update --list --config update-config.yaml

  update-packages:
    needs: check-updates
    if: github.event.inputs.update_type == 'packages' || github.event.inputs.update_type == 'all' || github.event.inputs.update_type == ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Update packages
        id: update
        run: |
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            go run . update --packages --config update-config.yaml --dry-run
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            go run . update --packages --config update-config.yaml
          fi

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Go packages'
          title: '⬆️ Update Go packages'
          body: |
            ## Summary
            Automated dependency updates for Go packages.

            Generated by GitHub Actions workflow.
          branch: update/packages
          delete-branch: true

  update-go-version:
    needs: check-updates
    if: github.event.inputs.update_type == 'go-version' || github.event.inputs.update_type == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check latest Go version
        run: |
          go run . update --list --go-version

      - name: Update Go version
        if: github.event.inputs.dry_run != 'true'
        run: |
          go run . update --go-version --config update-config.yaml --major=false

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Go version'
          title: '🔄 Update Go version'
          body: |
            ## Summary
            Automated Go version update.

            Generated by GitHub Actions workflow.
          branch: update/go-version
          delete-branch: true

  update-docker-images:
    needs: check-updates
    if: github.event.inputs.update_type == 'docker-image' || github.event.inputs.update_type == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check Docker image updates
        run: |
          go run . update --list --docker-image --config update-config.yaml

      - name: Update Docker images
        if: github.event.inputs.dry_run != 'true'
        run: |
          go run . update --docker-image --config update-config.yaml

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Docker base images'
          title: '🐳 Update Docker base images'
          body: |
            ## Summary
            Automated Docker image version updates.

            Generated by GitHub Actions workflow.
          branch: update/docker-images
          delete-branch: true